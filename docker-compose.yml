version: '3.2'
services:
  gatsby:
    build:
      context: .
    networks:
      - reverseproxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.backend=gatsby"
      - "traefik.frontend.rule=Host:blog.mwcm.ca"
      - "traefik.docker.network=reverseproxy_reverseproxy"

networks:
  reverseproxy:
    external:
      name: reverseproxy_reverseproxy
